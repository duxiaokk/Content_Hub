# =============================================================================
# Promtail 配置文件 — Docker 容器日志采集
# =============================================================================

server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    relabel_configs:
      # 只采集 blog-* 容器
      - source_labels: [__meta_docker_container_name]
        regex: /blog-(.*)
        target_label: container
        replacement: $1
      # 将容器标签转为日志标签
      - source_labels: [__meta_docker_container_name]
        regex: /blog-(.*)
        action: keep
      - source_labels: [__meta_docker_container_name]
        target_label: job
        replacement: docker
    # 解析 JSON 格式日志
    pipeline_stages:
      - json:
          expressions:
            timestamp: timestamp
            level: level
            service: service
            message: message
            trace_id: trace_id
            task_id: task_id
            agent_key: agent_key
            run_id: run_id
            logger: logger
      - labels:
          level:
          service:
          trace_id:
          task_id:
          agent_key:
      - timestamp:
          source: timestamp
          format: RFC3339
