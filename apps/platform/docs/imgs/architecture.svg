<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 860" font-family="'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f4f8"/>
      <stop offset="100%" stop-color="#dbe4ee"/>
    </linearGradient>
    <!-- Box gradients -->
    <linearGradient id="blogGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="schedulerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0891b2"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="mempoolGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#059669"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="cacheGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="dbGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="115%" height="115%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#00000025"/>
    </filter>
    <marker id="arrowRight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#64748b"/>
    </marker>
    <marker id="arrowRightGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#059669"/>
    </marker>
    <marker id="arrowRightRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 Z" fill="#dc2626"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="860" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="22" font-weight="bold" fill="#1e293b">系统整体架构</text>
  <text x="550" y="56" text-anchor="middle" font-size="13" fill="#64748b">My Blog — 调度驱动型多 Agent 博客平台</text>

  <!-- ============================================================ -->
  <!-- LAYER 1: 用户接入层 -->
  <!-- ============================================================ -->
  <rect x="340" y="70" width="420" height="52" rx="26" fill="#1e293b" filter="url(#shadow)"/>
  <text x="550" y="94" text-anchor="middle" font-size="15" font-weight="bold" fill="#ffffff">用户接入层</text>
  <text x="550" y="110" text-anchor="middle" font-size="11" fill="#94a3b8">Browser / Mobile Client / HTTP Request</text>

  <!-- Arrow: User → Blog -->
  <line x1="550" y1="122" x2="550" y2="152" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- ============================================================ -->
  <!-- LAYER 2: 博客主服务 -->
  <!-- ============================================================ -->
  <rect x="170" y="155" width="760" height="180" rx="10" fill="#eef2ff" stroke="#a5b4fc" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="178" text-anchor="middle" font-size="15" font-weight="bold" fill="#3730a3">博客主服务 Personal Blog</text>

  <!-- Sub modules -->
  <rect x="195" y="190" width="170" height="60" rx="8" fill="url(#blogGrad)" filter="url(#shadow)"/>
  <text x="280" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Web 页面</text>
  <text x="280" y="234" text-anchor="middle" font-size="10" fill="#c7d2fe">FastAPI + Jinja2</text>

  <rect x="395" y="190" width="170" height="60" rx="8" fill="url(#blogGrad)" filter="url(#shadow)"/>
  <text x="480" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">API 接口</text>
  <text x="480" y="234" text-anchor="middle" font-size="10" fill="#c7d2fe">RESTful / API Routes</text>

  <rect x="595" y="190" width="170" height="60" rx="8" fill="url(#blogGrad)" filter="url(#shadow)"/>
  <text x="680" y="216" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">认证鉴权</text>
  <text x="680" y="234" text-anchor="middle" font-size="10" fill="#c7d2fe">JWT / Cookie / CSRF</text>

  <rect x="290" y="265" width="210" height="52" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="395" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#3730a3">Scheduler Client</text>
  <text x="395" y="304" text-anchor="middle" font-size="10" fill="#6366f1">任务投递 SDK</text>

  <rect x="530" y="265" width="210" height="52" rx="8" fill="#e0e7ff" stroke="#a5b4fc" stroke-width="1"/>
  <text x="635" y="288" text-anchor="middle" font-size="11" font-weight="bold" fill="#3730a3">Mempool Client</text>
  <text x="635" y="304" text-anchor="middle" font-size="10" fill="#6366f1">共享记忆池 SDK</text>

  <!-- Arrow: Blog → Scheduler & Mempool -->
  <line x1="395" y1="317" x2="395" y2="370" stroke="#059669" stroke-width="2" marker-end="url(#arrowRightGreen)"/>
  <line x1="635" y1="317" x2="635" y2="370" stroke="#059669" stroke-width="2" marker-end="url(#arrowRightGreen)"/>
  <text x="355" y="348" text-anchor="end" font-size="10" fill="#059669">投递异步任务</text>
  <text x="670" y="348" text-anchor="start" font-size="10" fill="#059669">读写共享数据</text>

  <!-- ============================================================ -->
  <!-- LAYER 3: 调度中心 -->
  <!-- ============================================================ -->
  <rect x="170" y="370" width="760" height="175" rx="10" fill="#ecfeff" stroke="#67e8f9" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="393" text-anchor="middle" font-size="15" font-weight="bold" fill="#155e75">调度中心 Scheduler Center</text>

  <!-- Fast Submit -->
  <rect x="195" y="405" width="155" height="58" rx="8" fill="url(#schedulerGrad)" filter="url(#shadow)"/>
  <text x="272" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Fast Submit API</text>
  <text x="272" y="448" text-anchor="middle" font-size="10" fill="#a5f3fc">Redis 快速投递</text>

  <!-- Standard -->
  <rect x="370" y="405" width="155" height="58" rx="8" fill="url(#schedulerGrad)" filter="url(#shadow)"/>
  <text x="447" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">路由与调度</text>
  <text x="447" y="448" text-anchor="middle" font-size="10" fill="#a5f3fc">Dispatcher</text>

  <!-- Worker -->
  <rect x="545" y="405" width="155" height="58" rx="8" fill="url(#schedulerGrad)" filter="url(#shadow)"/>
  <text x="622" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Ingest Worker</text>
  <text x="622" y="448" text-anchor="middle" font-size="10" fill="#a5f3fc">异步落库</text>

  <!-- Agent Registry -->
  <rect x="720" y="405" width="185" height="58" rx="8" fill="url(#schedulerGrad)" filter="url(#shadow)"/>
  <text x="812" y="428" text-anchor="middle" font-size="11" font-weight="bold" fill="#fff">Agent 注册与发现</text>
  <text x="812" y="448" text-anchor="middle" font-size="10" fill="#a5f3fc">健康检查 / 路由</text>

  <!-- Arrow: Scheduler → Agents -->
  <line x1="812" y1="463" x2="812" y2="570" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRight)"/>
  <line x1="622" y1="463" x2="622" y2="570" stroke="#64748b" stroke-width="2" marker-end="url(#arrowRight)"/>
  <text x="660" y="490" text-anchor="start" font-size="10" fill="#64748b">分发执行任务</text>

  <!-- ============================================================ -->
  <!-- LAYER 4: Agent 层 -->
  <!-- ============================================================ -->
  <rect x="170" y="570" width="760" height="128" rx="10" fill="#f5f3ff" stroke="#c4b5fd" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="593" text-anchor="middle" font-size="15" font-weight="bold" fill="#4c1d95">Agent 执行层</text>

  <rect x="195" y="605" width="225" height="78" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="307" y="630" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Comment Agent</text>
  <text x="307" y="650" text-anchor="middle" font-size="10" fill="#ddd6fe">评论审核 / 回复</text>
  <text x="307" y="668" text-anchor="middle" font-size="10" fill="#ddd6fe">task_type: comment.*</text>

  <rect x="445" y="605" width="225" height="78" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="557" y="630" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Audit Agent</text>
  <text x="557" y="650" text-anchor="middle" font-size="10" fill="#ddd6fe">草稿内容审核</text>
  <text x="557" y="668" text-anchor="middle" font-size="10" fill="#ddd6fe">task_type: audit.*</text>

  <rect x="695" y="605" width="210" height="78" rx="8" fill="url(#agentGrad)" filter="url(#shadow)"/>
  <text x="800" y="630" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Ado Repost</text>
  <text x="800" y="650" text-anchor="middle" font-size="10" fill="#ddd6fe">内容搬运/同步</text>
  <text x="800" y="668" text-anchor="middle" font-size="10" fill="#ddd6fe">task_type: ado_repost.*</text>

  <!-- Arrow: Agents → Mempool & Cache/DB -->
  <line x1="307" y1="683" x2="307" y2="730" stroke="#059669" stroke-width="2" marker-end="url(#arrowRightGreen)"/>
  <line x1="557" y1="683" x2="557" y2="730" stroke="#059669" stroke-width="2" marker-end="url(#arrowRightGreen)"/>
  <line x1="800" y1="683" x2="800" y2="730" stroke="#059669" stroke-width="2" marker-end="url(#arrowRightGreen)"/>
  <text x="405" y="718" text-anchor="start" font-size="10" fill="#059669">读写共享数据</text>

  <!-- ============================================================ -->
  <!-- LAYER 5: 数据层 -->
  <!-- ============================================================ -->
  <rect x="95" y="730" width="910" height="115" rx="10" fill="#fefce8" stroke="#fde68a" stroke-width="1.5" filter="url(#shadow)"/>
  <text x="550" y="753" text-anchor="middle" font-size="15" font-weight="bold" fill="#713f12">持久化与缓存层</text>

  <!-- SQLite -->
  <rect x="120" y="765" width="200" height="65" rx="8" fill="url(#dbGrad)" filter="url(#shadow)"/>
  <text x="220" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">SQLite</text>
  <text x="220" y="810" text-anchor="middle" font-size="10" fill="#fef3c7">任务元数据 / 事件</text>

  <!-- Redis -->
  <rect x="365" y="765" width="200" height="65" rx="8" fill="url(#cacheGrad)" filter="url(#shadow)"/>
  <text x="465" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Redis</text>
  <text x="465" y="810" text-anchor="middle" font-size="10" fill="#fecaca">快速投递 / 队列 / 幂等</text>

  <!-- Shared Memory -->
  <rect x="610" y="765" width="200" height="65" rx="8" fill="url(#mempoolGrad)" filter="url(#shadow)"/>
  <text x="710" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">Shared Memory</text>
  <text x="710" y="810" text-anchor="middle" font-size="10" fill="#a7f3d0">Redis + SQLite 双存储</text>

  <!-- File System -->
  <rect x="855" y="765" width="130" height="65" rx="8" fill="#78716c" filter="url(#shadow)"/>
  <text x="920" y="790" text-anchor="middle" font-size="12" font-weight="bold" fill="#fff">文件系统</text>
  <text x="920" y="810" text-anchor="middle" font-size="10" fill="#d6d3d1">Markdown 存储</text>

  <!-- ============================================================ -->
  <!-- Legend -->
  <!-- ============================================================ -->
  <rect x="92" y="805" width="1" height="1" fill="none"/>
</svg>
